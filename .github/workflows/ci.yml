name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r api/requirements.txt
          python -m pip install pytest

      - name: Import smoke test
        env:
          PYTHONPATH: ${{ github.workspace }}/api
        run: |
          python -c "from src.main import app; print('import ok')"

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/api
        run: |
          python -m pytest -q api/tests

  docker-compose-smoke:
    runs-on: ubuntu-latest
    needs: api-tests
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start (compose)
        env:
          OPS_API_TOKEN: ci-token
        run: |
          docker compose up -d --build
          sleep 10
          docker compose ps

      - name: Smoke test
        env:
          OPS_API_TOKEN: ci-token
        run: |
          curl -fsS http://localhost:8001/health
          curl -fsS http://localhost:8001/metrics
          curl -fsS -H "X-Ops-Token: ${OPS_API_TOKEN}" "http://localhost:8001/events?limit=1"
          curl -fsS http://localhost:3000 > /dev/null

      - name: Logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color

      - name: Shutdown
        if: always()
        run: docker compose down
