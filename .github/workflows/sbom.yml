name: SBOM

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install CycloneDX tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install cyclonedx-bom

      - name: Generate SBOM (CycloneDX)
        shell: bash
        run: |
          set -euo pipefail

          if [ -f api/requirements.txt ]; then
            echo "Generating SBOM from api/requirements.txt"
            cyclonedx-py requirements -i api/requirements.txt -o sbom.cdx.json
          elif [ -f requirements.txt ]; then
            echo "Generating SBOM from requirements.txt"
            cyclonedx-py requirements -i requirements.txt -o sbom.cdx.json
          else
            echo "No requirements file found (api/requirements.txt or requirements.txt)."
            exit 1
          fi

          ls -la sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json